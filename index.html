            padding: 0;

        }

            background: #f6f6f6;
            color: #222;

            padding: 20px;
        }

            display: flex;

            padding-bottom: 15px;
            cursor: default;
            user-select: none;
        }

        .header .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 5px 10px;

            position: relative;
        }

        .header .logo-area:hover {
            background: #f0f0f0;
        }

            font-weight: 300;
            letter-spacing: 1px;
            color: #1a1a1a;

        }

            color: #e60000;
        }

            gap: 10px;
            align-items: center;

        }

            font-size: 12px;
            color: #2e7d32;

        }

        .header-controls .edit-badge.active {

        }

        .header-controls .export-btn {

            padding: 6px 16px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .header-controls .export-btn.active {
            display: inline-block;
        }

        .header-controls .export-btn:hover {
            background: #1b5e20;
        }

        .header-controls .exit-btn {
            display: none;
            padding: 6px 16px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .header-controls .exit-btn.active {
            display: inline-block;
        }

        .header-controls .exit-btn:hover {
            background: #b71c1c;
        }

        }

            border: 1px solid #a2a9b1;

            color: white;
            border: none;

            cursor: pointer;

            background: white;

            box-shadow: 0 1px 4px rgba(0,0,0,0.08);

            top: 20px;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

            font-size: 16px;
            color: #54595d;

            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-bottom: 8px;

        }

        }

        }

            margin-bottom: 2px;
        }

            padding: 5px 10px;
            color: #0645ad;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            transition: 0.15s;
            cursor: pointer;

            background: #eaf3ff;

        }

            background: #d4e4ff;
            font-weight: 600;
        }

            min-width: 0;

            background: white;
            border-radius: 8px;
            padding: 30px 35px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            display: none;
            animation: fadeIn 0.25s ease;
            position: relative;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page h2 {
            font-size: 30px;
            font-weight: 400;
            border-bottom: 1px solid #eaecf0;
            padding-bottom: 6px;
            margin-bottom: 20px;
        }

            display: none;
            float: right;
            padding: 4px 14px;
            background: #3366cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            margin-left: 10px;

            display: inline-block;
        }

            background: #2a4fa8;
        }

            padding-bottom: 6px;
            margin-bottom: 8px;

            width: 70px;
            flex-shrink: 0;
            color: #54595d;
            font-size: 12px;
        }

            font-size: 13px;

            background: #fffde7;
            border-radius: 3px;
            padding: 0 4px;
        }

        .page .text-content {

            padding: 12px 16px;
            border-radius: 6px;
            border: 2px dashed #f9a825;
            outline: none;

            border-color: #3366cc;
        }

            text-decoration: none;
            border-bottom: 1px dotted #a2a9b1;

            border-top: 1px solid #eaecf0;
            font-size: 13px;
            color: #54595d;

            display: none;
            gap: 10px;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid #eaecf0;
            flex-wrap: wrap;

            display: flex;
        }

            padding: 6px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;

            background: #4caf50;
            color: white;
        }

            background: #388e3c;
        }

            background: #e0e0e0;
            color: #333;
        }

            background: #c8c8c8;

            }

            .header-controls {
                flex-direction: column;
                align-items: stretch;
            }
        }

        .page .synopsis-block {
            font-style: italic;
            color: #444;
            background: #f8f9fa;
            padding: 16px 20px;
            border-left: 4px solid #e60000;
            margin-bottom: 18px;
            border-radius: 0 4px 4px 0;
        }

            font-style: normal;
            color: #222;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .page .synopsis-block p {
            margin-bottom: 8px;
        }

        .page .synopsis-block p:last-child {
            margin-bottom: 0;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: #c1c7cd;
            border-radius: 4px;
        }

        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 24px;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 999;
        }

        .notification.show {
            transform: translateY(0);
            opacity: 1;
        }

        .notification.success {
            background: #2e7d32;
        }

        .notification.info {
            background: #1a237e;
        }

        .notification.warning {
            background: #e65100;
        }

        .notification.error {
            background: #c62828;
        }
    </style>
</head>

                </h2>
                <div class="text-content">${textHTML}</div>
                <div class="categories">Основной сюжет вселенной</div>
                <div class="edit-actions">
                    <button class="save-btn" onclick="savePage('synopsis')">Сохранить</button>
                    <button class="cancel-btn" onclick="cancelEdit('synopsis')">Отмена</button>
                </div>
            </div>
        `;
    }

    function renderPage(char) {
        let infoboxHTML = '';
        if (char.infobox) {
            infoboxHTML = `<div class="infobox"><h4>${char.title}</h4>`;
            for (const [label, value] of Object.entries(char.infobox)) {
                infoboxHTML += `<div class="row"><span class="label">${label}</span><span class="value" data-field="${label}">${value}</span></div>`;
            }
            infoboxHTML += `</div>`;
        }

        const textHTML = autoLink(char.text, char.id);

        return `
            <div class="page" data-id="${char.id}">
                <h2>
                    ${char.title}
                    <button class="edit-toggle-btn" onclick="toggleEdit('${char.id}')">Редактировать</button>
                </h2>
                ${infoboxHTML}
                <div class="text-content">${textHTML}</div>
                <div class="categories">${char.category}</div>
                <div class="edit-actions">
                    <button class="save-btn" onclick="savePage('${char.id}')">Сохранить</button>
                    <button class="cancel-btn" onclick="cancelEdit('${char.id}')">Отмена</button>
                </div>
            </div>
        `;
    }

    function buildNav() {
        const list = document.getElementById('navList');
        list.innerHTML = '';
        sortedCharacters.forEach(char => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.textContent = char.title;
            a.dataset.target = char.id;
            a.onclick = (e) => {
                e.preventDefault();
                navigateTo(char.id);
            };
            li.appendChild(a);
            list.appendChild(li);
        });
    }

    function navigateTo(id) {
        if (isEditingPage) {
            cancelEdit(isEditingPage);
        }

        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

        const target = document.querySelector(`.page[data-id="${id}"]`);
        if (target) target.classList.add('active');

        document.querySelectorAll('#navList a, .synopsis-link').forEach(a => {
            a.classList.toggle('active', a.dataset.target === id);
        });

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ============================================================
    // 5. 7 КЛИКОВ ПО ЛОГОТИПУ
    // ============================================================

    document.getElementById('logoArea').addEventListener('click', function() {
        clickCount++;

        clearTimeout(clickTimer);
        clickTimer = setTimeout(() => {
            clickCount = 0;
        }, 2000);

        if (clickCount >= 7) {
            clickCount = 0;
            activateEditMode();
        }
    });

    function activateEditMode() {
        if (isEditMode) return;
        isEditMode = true;

        document.getElementById('editBadge').classList.add('active');
        document.getElementById('exportBtn').classList.add('active');
        document.getElementById('exitBtn').classList.add('active');

        document.querySelectorAll('.page .edit-toggle-btn').forEach(btn => {
            btn.classList.add('active');
        });

        showNotification('Режим редактирования активирован', 'success');
    }

    function exitEditMode() {
        if (!isEditMode) return;

        if (isEditingPage) {
            cancelEdit(isEditingPage);
        }

        isEditMode = false;

        document.getElementById('editBadge').classList.remove('active');
        document.getElementById('exportBtn').classList.remove('active');
        document.getElementById('exitBtn').classList.remove('active');

        document.querySelectorAll('.page .edit-toggle-btn').forEach(btn => {
            btn.classList.remove('active');
        });

        showNotification('Режим редактирования выключен', 'info');
    }

    // ============================================================
    // 6. РЕДАКТИРОВАНИЕ
    // ============================================================

    function toggleEdit(pageId) {
        if (!isEditMode) {
            showNotification('Сначала активируйте режим редактирования (7 кликов по логотипу)', 'warning');
            return;
        }

        if (isEditingPage === pageId) {
            cancelEdit(pageId);
            return;
        }

        if (isEditingPage) {
            cancelEdit(isEditingPage);
        }

        const page = document.querySelector(`.page[data-id="${pageId}"]`);
        if (!page) return;

        const content = page.querySelector('.text-content');
        const actions = page.querySelector('.edit-actions');

        content.dataset.original = content.innerHTML;

        page.querySelectorAll('.infobox .row .value').forEach(el => {
            el.dataset.original = el.textContent;
            el.contentEditable = true;
        });

        content.contentEditable = true;
        content.focus();

        if (actions) actions.classList.add('active');

        const btn = page.querySelector('.edit-toggle-btn');
        if (btn) btn.textContent = 'Отменить';

        isEditingPage = pageId;
    }

    function savePage(pageId) {
        const page = document.querySelector(`.page[data-id="${pageId}"]`);
        if (!page) return;

        const content = page.querySelector('.text-content');
        const actions = page.querySelector('.edit-actions');

        const char = sortedCharacters.find(c => c.id === pageId);
        if (char) {
            char.text = content.innerHTML;
        } else if (pageId === 'synopsis') {
            synopsisData.text = content.innerHTML;
        }

        page.querySelectorAll('.infobox .row .value').forEach(el => {
            const label = el.dataset.field;
            if (char && char.infobox && label) {
                char.infobox[label] = el.textContent.trim();
            }
        });

        content.contentEditable = false;
        content.dataset.original = '';
        if (actions) actions.classList.remove('active');

        page.querySelectorAll('.infobox .row .value').forEach(el => {
            el.contentEditable = false;
            el.dataset.original = '';
        });

        const btn = page.querySelector('.edit-toggle-btn');
        if (btn) btn.textContent = 'Редактировать';

        isEditingPage = null;

        const newContent = autoLink(content.innerHTML, pageId);
        content.innerHTML = newContent;

        showNotification('Страница сохранена! Не забудьте экспортировать JSON.', 'success');
    }

    function cancelEdit(pageId) {
        const page = document.querySelector(`.page[data-id="${pageId}"]`);
        if (!page) return;

        const content = page.querySelector('.text-content');
        const actions = page.querySelector('.edit-actions');

        if (content.dataset.original) {
            content.innerHTML = content.dataset.original;
            content.dataset.original = '';
        }

        content.contentEditable = false;
        if (actions) actions.classList.remove('active');

        page.querySelectorAll('.infobox .row .value').forEach(el => {
            if (el.dataset.original) {
                el.textContent = el.dataset.original;
                el.dataset.original = '';
            }
            el.contentEditable = false;
        });

        const btn = page.querySelector('.edit-toggle-btn');
        if (btn) btn.textContent = 'Редактировать';

        if (isEditingPage === pageId) {
            isEditingPage = null;
        }

        showNotification('Редактирование отменено', 'info');
    }

    // ============================================================
    // 7. ЭКСПОРТ JSON
    // ============================================================

    function exportData() {
        const data = {
            characters: sortedCharacters,
            synopsis: synopsisData
        };

        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = 'data.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        showNotification('data.json скачан! Замените файл в репозитории.', 'success');
    }

    // ============================================================
    // 8. ПОИСК
    // ============================================================

    function searchCharacter() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        if (!query) return;

        const found = sortedCharacters.find(c => c.title.toLowerCase().includes(query));
        if (found) {
            navigateTo(found.id);
            document.getElementById('searchInput').value = '';
        } else {
            showNotification(`Персонаж "${query}" не найден`, 'error');
        }
    }

    // ============================================================
    // 9. УВЕДОМЛЕНИЯ
    // ============================================================

    function showNotification(message, type = 'info') {
        const el = document.getElementById('notification');
        el.textContent = message;
        el.className = 'notification ' + type + ' show';
        clearTimeout(el._timeout);
        el._timeout = setTimeout(() => {
            el.classList.remove('show');
        }, 4000);
    }

    // ============================================================
    // 10. ИНИЦИАЛИЗАЦИЯ
    // ============================================================

    function init() {
        const container = document.getElementById('contentArea');

        container.innerHTML = renderSynopsis();

        sortedCharacters.forEach(char => {
            container.innerHTML += renderPage(char);
        });

        buildNav();
        navigateTo('synopsis');

        container.addEventListener('click', (e) => {
            const link = e.target.closest('.wiki-link');
            if (link) {
                e.preventDefault();
                const targetId = link.dataset.target;
                if (targetId) navigateTo(targetId);
            }
        });
    }

    document.addEventListener('DOMContentLoaded', init);

    // ============================================================
    // 11. ГЛОБАЛЬНЫЕ ФУНКЦИИ
    // ============================================================

    window.navigateTo = navigateTo;
    window.searchCharacter = searchCharacter;
    window.toggleEdit = toggleEdit;
    window.savePage = savePage;
    window.cancelEdit = cancelEdit;
    window.exportData = exportData;
    window.exitEditMode = exitEditMode;
    window.showNotification = showNotification;
</script>

</body>
</html>
