<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гоночная АУ — Вики</title>
    <style>
        /* ===== ПЕРЕМЕННЫЕ ДЛЯ ТЕМ ===== */
        :root {
            --bg-body: #f6f6f6;
            --bg-page: #ffffff;
            --bg-sidebar: #ffffff;
            --bg-block: #f8f9fa;
            --text-primary: #222222;
            --text-secondary: #54595d;
            --text-link: #b71c1c;
            --text-link-hover: #ffebee;
            --border-color: #a2a9b1;
            --border-light: #eaecf0;
            --shadow: rgba(0,0,0,0.08);
            --edit-bg: #fffde7;
            --edit-border: #f9a825;
            --badge-bg: #e8f5e9;
            --badge-color: #2e7d32;
            --badge-border: #a5d6a7;
            --btn-primary: #c62828;
            --btn-primary-hover: #b71c1c;
            --btn-success: #4caf50;
            --btn-success-hover: #388e3c;
            --btn-danger: #d32f2f;
            --btn-danger-hover: #b71c1c;
            --btn-cancel: #e0e0e0;
            --btn-cancel-hover: #c8c8c8;
            --synopsis-border: #e60000;
            --synopsis-bg: #fff5f5;
            --notification-success: #2e7d32;
            --notification-info: #1a237e;
            --notification-warning: #e65100;
            --notification-error: #c62828;
            --logo-hover: #ffebee;
            --fanfic-border: #2e7d32;
            --fanfic-bg: #f1f8e9;
        }

        /* ===== ТЁМНАЯ ТЕМА ===== */
        body.dark-theme {
            --bg-body: #1a1a1a;
            --bg-page: #2d2d2d;
            --bg-sidebar: #2d2d2d;
            --bg-block: #3d3d3d;
            --text-primary: #e0e0e0;
            --text-secondary: #aaaaaa;
            --text-link: #ef5350;
            --text-link-hover: #3a1a1a;
            --border-color: #555555;
            --border-light: #444444;
            --shadow: rgba(0,0,0,0.3);
            --edit-bg: #3d3d2d;
            --edit-border: #f9a825;
            --badge-bg: #1a3a1a;
            --badge-color: #81c784;
            --badge-border: #2e7d32;
            --btn-primary: #8b1a1a;
            --btn-primary-hover: #a02222;
            --btn-success: #2e7d32;
            --btn-success-hover: #388e3c;
            --btn-danger: #8b1a1a;
            --btn-danger-hover: #a02222;
            --btn-cancel: #444444;
            --btn-cancel-hover: #555555;
            --synopsis-border: #ff4444;
            --synopsis-bg: #3d1a1a;
            --notification-success: #1a3a1a;
            --notification-info: #1a1a3a;
            --notification-warning: #3a2a1a;
            --notification-error: #3a1a1a;
            --logo-hover: #3a1a1a;
            --fanfic-border: #388e3c;
            --fanfic-bg: #1a2a1a;
        }

        /* ===== ГЛОБАЛЬНЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        /* ===== ШАПКА ===== */
        .header {
            max-width: 1200px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            cursor: default;
            user-select: none;
        }

        .header .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .header .logo-area:hover {
            background: var(--logo-hover);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 1px;
            color: var(--text-primary);
            pointer-events: none;
        }

        .header h1 span {
            font-weight: 700;
            color: #e60000;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-controls .edit-badge {
            display: none;
            font-size: 12px;
            color: var(--badge-color);
            background: var(--badge-bg);
            padding: 4px 12px;
            border-radius: 12px;
            border: 1px solid var(--badge-border);
        }

        .header-controls .edit-badge.active {
            display: inline-block;
        }

        .header-controls .export-btn {
            display: none;
            padding: 6px 16px;
            background: var(--btn-success);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .header-controls .export-btn.active {
            display: inline-block;
        }

        .header-controls .export-btn:hover {
            background: var(--btn-success-hover);
        }

        .header-controls .exit-btn {
            display: none;
            padding: 6px 16px;
            background: var(--btn-danger);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .header-controls .exit-btn.active {
            display: inline-block;
        }

        .header-controls .exit-btn:hover {
            background: var(--btn-danger-hover);
        }

        .header-controls .theme-btn {
            padding: 6px 16px;
            background: var(--btn-primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .header-controls .theme-btn:hover {
            background: var(--btn-primary-hover);
        }

        .search-box {
            display: flex;
            gap: 8px;
        }

        .search-box input {
            padding: 8px 14px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 15px;
            width: 200px;
            background: var(--bg-page);
            color: var(--text-primary);
            transition: 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--btn-primary);
            box-shadow: 0 0 0 2px rgba(198, 40, 40, 0.15);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-box button {
            padding: 8px 16px;
            background: var(--btn-primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.2s;
        }

        .search-box button:hover {
            background: var(--btn-primary-hover);
        }

        /* ===== КОНТЕЙНЕР ===== */
        .wiki-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* ===== БОКОВАЯ ПАНЕЛЬ ===== */
        .sidebar {
            flex: 0 0 260px;
            background: var(--bg-sidebar);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 1px 4px var(--shadow);
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .sidebar h3 {
            font-size: 16px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-light);
        }

        .sidebar .synopsis-link {
            display: block;
            padding: 8px 10px;
            margin-bottom: 6px;
            background: var(--text-link-hover);
            border-radius: 6px;
            color: var(--text-link);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            border-left: 3px solid var(--synopsis-border);
            transition: 0.15s;
            cursor: pointer;
        }

        .sidebar .synopsis-link:hover {
            background: var(--text-link-hover);
            opacity: 0.8;
        }

        .sidebar .synopsis-link.active {
            background: var(--text-link-hover);
            opacity: 0.9;
        }

        .sidebar .arts-link {
            display: block;
            padding: 8px 10px;
            margin-bottom: 6px;
            background: var(--text-link-hover);
            border-radius: 6px;
            color: var(--text-link);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            border-left: 3px solid var(--synopsis-border);
            transition: 0.15s;
            cursor: pointer;
        }

        .sidebar .arts-link:hover {
            background: var(--text-link-hover);
            opacity: 0.8;
        }

        .sidebar .arts-link.active {
            background: var(--text-link-hover);
            opacity: 0.9;
        }

        .sidebar .fanfics-link {
            display: block;
            padding: 8px 10px;
            margin-bottom: 12px;
            background: var(--text-link-hover);
            border-radius: 6px;
            color: var(--text-link);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            border-left: 3px solid var(--synopsis-border);
            transition: 0.15s;
            cursor: pointer;
        }

        .sidebar .fanfics-link:hover {
            background: var(--text-link-hover);
            opacity: 0.8;
        }

        .sidebar .fanfics-link.active {
            background: var(--text-link-hover);
            opacity: 0.9;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            margin-bottom: 2px;
        }

        .sidebar ul li a {
            display: block;
            padding: 5px 10px;
            color: var(--text-link);
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            transition: 0.15s;
            cursor: pointer;
        }

        .sidebar ul li a:hover {
            background: var(--text-link-hover);
            text-decoration: underline;
        }

        .sidebar ul li a.active {
            background: var(--text-link-hover);
            font-weight: 600;
        }

        /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
        .content {
            flex: 1;
            min-width: 0;
        }

        /* ===== СТРАНИЦА ===== */
        .page {
            background: var(--bg-page);
            border-radius: 8px;
            padding: 30px 35px;
            box-shadow: 0 1px 4px var(--shadow);
            display: none;
            animation: fadeIn 0.25s ease;
            position: relative;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .page.active {
            display: block;
            width: 100%;
            padding: 20px 25px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page h2 {
            font-size: 30px;
            font-weight: 400;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 6px;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .page .edit-toggle-btn {
            display: none;
            float: right;
            padding: 4px 14px;
            background: var(--btn-primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            margin-left: 10px;
        }

        .page .edit-toggle-btn.active {
            display: inline-block;
        }

        .page .edit-toggle-btn:hover {
            background: var(--btn-primary-hover);
        }

        /* ===== БЛОКИ НА СТРАНИЦЕ ===== */
        .content-block {
            margin-bottom: 22px;
            clear: both;
        }

        .content-block:last-child {
            margin-bottom: 0;
        }

        .content-block .block-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 2px solid var(--border-light);
            padding-bottom: 4px;
            margin-bottom: 10px;
        }

        .content-block .block-title .block-edit-btn {
            display: none;
            float: right;
            padding: 2px 12px;
            background: var(--btn-primary);
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }

        .content-block .block-title .block-edit-btn.active {
            display: inline-block;
        }

        .content-block .block-title .block-edit-btn:hover {
            background: var(--btn-primary-hover);
        }

        .content-block .block-content {
            overflow: hidden;
            color: var(--text-primary);
        }

        .content-block .block-content[contenteditable="true"] {
            background: var(--edit-bg);
            padding: 10px 14px;
            border-radius: 6px;
            border: 2px dashed var(--edit-border);
            outline: none;
        }

        .content-block .block-content[contenteditable="true"]:focus {
            border-color: var(--btn-primary);
        }

        .content-block .block-content p {
            margin-bottom: 8px;
        }

        .content-block .block-content p:last-child {
            margin-bottom: 0;
        }

        .content-block .block-content strong {
            color: var(--text-primary);
        }

        .content-block .block-content em {
            color: var(--text-secondary);
        }

        /* ===== СТРАНИЦА АРТОВ ===== */
        .arts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        .art-card {
            background: var(--bg-block);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 4px var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .art-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .art-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .art-card .art-info {
            padding: 12px 14px;
        }

        .art-card .art-title {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .art-card .art-artist {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .art-card .art-artist a {
            color: var(--text-link);
            text-decoration: none;
            border-bottom: 1px dotted var(--border-color);
        }

        .art-card .art-artist a:hover {
            border-bottom: 1px solid var(--text-link);
        }

        /* ===== СТРАНИЦА ФАНФИКОВ ===== */
        .fanfics-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 10px;
        }

        .fanfic-card {
            background: var(--bg-block);
            border-radius: 8px;
            padding: 18px 22px;
            box-shadow: 0 1px 4px var(--shadow);
            border-left: 4px solid var(--synopsis-border);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .fanfic-card:hover {
            transform: translateX(4px);
            box-shadow: 0 2px 8px var(--shadow);
        }

        .fanfic-card .fanfic-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .fanfic-card .fanfic-title a {
            color: var(--text-link);
            text-decoration: none;
            border-bottom: 1px dotted var(--border-color);
        }

        .fanfic-card .fanfic-title a:hover {
            border-bottom: 1px solid var(--text-link);
        }

        .fanfic-card .fanfic-author {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .fanfic-card .fanfic-author strong {
            color: var(--text-primary);
        }

        /* ===== ЛАЙТБОКС ===== */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox .lightbox-content {
            max-width: 90%;
            max-height: 85%;
            border-radius: 8px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            object-fit: contain;
        }

        .lightbox .lightbox-close {
            position: fixed;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            z-index: 1001;
            transition: 0.2s;
            font-family: Arial, sans-serif;
            line-height: 1;
        }

        .lightbox .lightbox-close:hover {
            color: #e0e0e0;
            transform: scale(1.1);
        }

        /* ===== КНОПКИ РЕДАКТИРОВАНИЯ ===== */
        .edit-actions {
            display: none;
            gap: 10px;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--border-light);
            flex-wrap: wrap;
            clear: both;
        }

        .edit-actions.active {
            display: flex;
        }

        .edit-actions button {
            padding: 6px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .edit-actions .save-btn {
            background: var(--btn-success);
            color: white;
        }

        .edit-actions .save-btn:hover {
            background: var(--btn-success-hover);
        }

        .edit-actions .cancel-btn {
            background: var(--btn-cancel);
            color: var(--text-primary);
        }

        .edit-actions .cancel-btn:hover {
            background: var(--btn-cancel-hover);
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 820px) {
            .page {
                padding: 20px;
                width: 100%;
                box-sizing: border-box;
            }
    
            .page .content-block,
            .page .fanfics-list,
            .page .fanfic-card {
                width: 100%;
                box-sizing: border-box;
            }

            .wiki-container {
                flex-direction: column;
                align-items: stretch; 
            }

            .sidebar {
                flex: auto;
                position: static;
                max-height: 300px;
                width: 100%;
            }

            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box input {
                width: 100%;
            }

            .header-controls {
                flex-direction: column;
                align-items: stretch;
            }

            .header-controls .theme-btn {
                width: 100%;
            }

            .arts-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }

            .art-card img {
                height: 150px;
            }
        }

        @media (max-width: 480px) {
            .page {
                width: 100%;
            }
            
            .arts-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            .art-card img {
                height: 120px;
            }

            .art-card .art-info {
                padding: 8px 10px;
            }

            .art-card .art-title {
                font-size: 13px;
            }

            .art-card .art-artist {
                font-size: 11px;
            }
        }

        /* ===== УВЕДОМЛЕНИЕ ===== */
        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 24px;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 999;
        }

        .notification.show {
            transform: translateY(0);
            opacity: 1;
        }

        .notification.success {
            background: var(--notification-success);
        }

        .notification.info {
            background: var(--notification-info);
        }

        .notification.warning {
            background: var(--notification-warning);
        }

        .notification.error {
            background: var(--notification-error);
        }

        /* ===== СКРОЛЛБАР ===== */
        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: var(--bg-body);
            border-radius: 4px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="notification" id="notification"></div>

<!-- ===== ЛАЙТБОКС ===== -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
    <img class="lightbox-content" id="lightboxImg" src="" alt="">
</div>

<div class="header">
    <div class="logo-area" id="logoArea">
        <span style="font-size:24px;">🏁</span>
        <h1><span>Гоночная</span> АУ · Вики</h1>
    </div>
    <div class="header-controls">
        <span class="edit-badge" id="editBadge">Режим редактирования</span>
        <button class="export-btn" id="exportBtn" onclick="exportData()">Экспорт JSON</button>
        <button class="exit-btn" id="exitBtn" onclick="exitEditMode()">Выйти</button>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">Тёмная тема</button>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Найти персонажа..." onkeyup="if(event.key==='Enter') searchCharacter()">
            <button onclick="searchCharacter()">Найти</button>
        </div>
    </div>
</div>

<div class="wiki-container">
    <nav class="sidebar" id="sidebar">
        <a class="synopsis-link" data-target="synopsis" onclick="navigateTo('synopsis')">Сюжет</a>
        <a class="arts-link" data-target="arts" onclick="navigateTo('arts')">Арты</a>
        <a class="fanfics-link" data-target="fanfics" onclick="navigateTo('fanfics')">Фанфики</a>
        <h3>Персонажи</h3>
        <ul id="navList"></ul>
    </nav>
    <div class="content" id="contentArea"></div>
</div>

<script>
    // ===== ДАННЫЕ =====
    const charactersData = [
        {
            id: "adin",
            title: "Адин",
            blocks: [
                { title: "Общая информация", content: `<p><strong>Адин</strong> — действующий пилот команды Red Bull Racing в Формуле-1.</p>` },

    function openLightbox(imageSrc) {

        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';

    function closeLightbox() {
        const lightbox = document.getElementById('lightbox');
        lightbox.classList.remove('active');
        document.body.style.overflow = '';

    function renderBlocks(blocks, pageId) {
        let html = '';
        blocks.forEach((block, index) => {
            const blockId = pageId + '-block-' + index;
            html += `
                <div class="content-block" data-block-id="${blockId}">
                    <div class="block-title">
                        ${block.title}
                        <button class="block-edit-btn" onclick="toggleBlockEdit('${pageId}', ${index})">Редактировать</button>
                    </div>
                    <div class="block-content" data-original="">${block.content}</div>
                </div>
            `;
        });
        return html;
    }

    function buildNav() {
        const list = document.getElementById('navList');
        list.innerHTML = '';
        sortedCharacters.forEach(char => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.textContent = char.title;
            a.dataset.target = char.id;
            a.onclick = (e) => {
                e.preventDefault();
                navigateTo(char.id);
            };
            li.appendChild(a);
            list.appendChild(li);
        });
    }

    function navigateTo(id) {
        if (isEditingPage) cancelPageEdit(isEditingPage);
        if (isEditingBlock) cancelBlockEdit();
        if (isEditingArts) cancelArtsEdit();
        if (isEditingFanfics) cancelFanficsEdit();

        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

        const target = document.querySelector(`.page[data-id="${id}"]`);
        if (target) target.classList.add('active');

        document.querySelectorAll('#navList a, .synopsis-link, .arts-link, .fanfics-link').forEach(a => {
            a.classList.toggle('active', a.dataset.target === id);
        });

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

        document.getElementById('exitBtn').classList.add('active');

        document.querySelectorAll('.page .edit-toggle-btn').forEach(btn => btn.classList.add('active'));
        document.querySelectorAll('.block-edit-btn').forEach(btn => btn.classList.add('active'));

        showNotification('Режим редактирования активирован', 'success');
    }

    function exitEditMode() {
        if (!isEditMode) return;

        if (isEditingPage) cancelPageEdit(isEditingPage);
        if (isEditingBlock) cancelBlockEdit();
        if (isEditingArts) cancelArtsEdit();
        if (isEditingFanfics) cancelFanficsEdit();

        isEditMode = false;

        document.getElementById('editBadge').classList.remove('active');
        document.getElementById('exportBtn').classList.remove('active');
        document.getElementById('exitBtn').classList.remove('active');

        document.querySelectorAll('.page .edit-toggle-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.block-edit-btn').forEach(btn => btn.classList.remove('active'));

        showNotification('Режим редактирования выключен', 'info');
    }

    // ===== РЕДАКТИРОВАНИЕ СТРАНИЦЫ =====
    function togglePageEdit(pageId) {
        if (!isEditMode) {
            showNotification('Сначала активируйте режим редактирования (7 кликов по логотипу)', 'warning');
            return;
        }

        if (isEditingPage === pageId) {
            cancelPageEdit(pageId);
            return;
        }

        if (isEditingPage) cancelPageEdit(isEditingPage);
        if (isEditingBlock) cancelBlockEdit();
        if (isEditingArts) cancelArtsEdit();
        if (isEditingFanfics) cancelFanficsEdit();

        const page = document.querySelector(`.page[data-id="${pageId}"]`);
        if (!page) return;

        const actions = page.querySelector('.edit-actions');

        page.querySelectorAll('.block-content').forEach(el => {
            el.dataset.original = el.innerHTML;
            el.contentEditable = true;
        });

        if (actions) actions.classList.add('active');

        const btn = page.querySelector('.edit-toggle-btn');
        if (btn) btn.textContent = 'Отменить';

        isEditingPage = pageId;
    }

    function cancelPageEdit(pageId) {
        const page = document.querySelector(`.page[data-id="${pageId}"]`);
        if (!page) return;

        const actions = page.querySelector('.edit-actions');

        page.querySelectorAll('.block-content').forEach(el => {
            if (el.dataset.original) {
                el.innerHTML = el.dataset.original;
                el.dataset.original = '';
            }
            el.contentEditable = false;
        });

        if (actions) actions.classList.remove('active');

        const btn = page.querySelector('.edit-toggle-btn');
        if (btn) btn.textContent = 'Редактировать';

        if (isEditingPage === pageId) isEditingPage = null;
    }

    function savePage(pageId) {
        const page = document.querySelector(`.page[data-id="${pageId}"]`);
        if (!page) return;

        const char = sortedCharacters.find(c => c.id === pageId);

        const blockContents = page.querySelectorAll('.block-content');
        if (char) {
            blockContents.forEach((el, index) => {
                if (char.blocks[index]) {
                    char.blocks[index].content = el.innerHTML;
                }
            });
        } else if (pageId === 'synopsis') {
            blockContents.forEach((el, index) => {
                if (synopsisData.blocks[index]) {
                    synopsisData.blocks[index].content = el.innerHTML;
                }
            });
        }

        cancelPageEdit(pageId);
        showNotification('Страница сохранена! Не забудьте экспортировать JSON.', 'success');
    }

    // ===== РЕДАКТИРОВАНИЕ БЛОКА =====
    function toggleBlockEdit(pageId, blockIndex) {
        if (!isEditMode) {
            showNotification('Сначала активируйте режим редактирования (7 кликов по логотипу)', 'warning');
            return;
        }

        const blockId = pageId + '-block-' + blockIndex;
        if (isEditingBlock === blockId) {
            cancelBlockEdit();
            return;
        }

        if (isEditingPage) cancelPageEdit(isEditingPage);
        if (isEditingBlock) cancelBlockEdit();
        if (isEditingArts) cancelArtsEdit();
        if (isEditingFanfics) cancelFanficsEdit();

        const page = document.querySelector(`.page[data-id="${pageId}"]`);
        if (!page) return;

        const blocks = page.querySelectorAll('.content-block');
        const block = blocks[blockIndex];
        if (!block) return;

        const content = block.querySelector('.block-content');
        content.dataset.original = content.innerHTML;
        content.contentEditable = true;
        content.focus();

        const btn = block.querySelector('.block-edit-btn');
        if (btn) btn.textContent = 'Сохранить';

        const saveBlockBtn = document.createElement('button');
        saveBlockBtn.textContent = 'Сохранить блок';
        saveBlockBtn.className = 'save-btn';
        saveBlockBtn.style.marginTop = '8px';
        saveBlockBtn.onclick = () => saveBlock(pageId, blockIndex);

        const cancelBlockBtn = document.createElement('button');
        cancelBlockBtn.textContent = 'Отмена';
        cancelBlockBtn.className = 'cancel-btn';
        cancelBlockBtn.style.marginTop = '8px';
        cancelBlockBtn.onclick = () => cancelBlockEdit();

        const actions = document.createElement('div');
        actions.className = 'edit-actions active';
        actions.id = 'block-actions-' + blockId;
        actions.appendChild(saveBlockBtn);
        actions.appendChild(cancelBlockBtn);
        block.appendChild(actions);

        isEditingBlock = blockId;
    }

    function saveBlock(pageId, blockIndex) {
        const page = document.querySelector(`.page[data-id="${pageId}"]`);
        if (!page) return;

        const blocks = page.querySelectorAll('.content-block');
        const block = blocks[blockIndex];
        if (!block) return;

        const content = block.querySelector('.block-content');

        const char = sortedCharacters.find(c => c.id === pageId);
        if (char && char.blocks[blockIndex]) {
            char.blocks[blockIndex].content = content.innerHTML;
        } else if (pageId === 'synopsis' && synopsisData.blocks[blockIndex]) {
            synopsisData.blocks[blockIndex].content = content.innerHTML;
        }

        cancelBlockEdit();
        showNotification('Блок сохранён!', 'success');
    }

    function cancelBlockEdit() {
        if (!isEditingBlock) return;

        const blockId = isEditingBlock;
        const actions = document.getElementById('block-actions-' + blockId);
        if (actions) actions.remove();

        const page = document.querySelector(`.page .content-block .block-content[contenteditable="true"]`);
        if (page) {
            const block = page.closest('.content-block');
            const btn = block.querySelector('.block-edit-btn');
            if (btn) btn.textContent = 'Редактировать';
            page.contentEditable = false;
            if (page.dataset.original) {
                page.innerHTML = page.dataset.original;
                page.dataset.original = '';
            }
        }

        isEditingBlock = null;
    }

    // ===== РЕДАКТИРОВАНИЕ АРТОВ =====
    let isEditingArts = false;
    let artsOriginalData = [];

    function toggleArtsEdit() {
        if (!isEditMode) {
            showNotification('Сначала активируйте режим редактирования (7 кликов по логотипу)', 'warning');
            return;
        }

        if (isEditingArts) {
            cancelArtsEdit();
            return;
        }

        if (isEditingPage) cancelPageEdit(isEditingPage);
        if (isEditingBlock) cancelBlockEdit();
        if (isEditingFanfics) cancelFanficsEdit();

        artsOriginalData = JSON.parse(JSON.stringify(artsData.arts));

        const container = document.getElementById('artsContainer');
        const cards = container.querySelectorAll('.art-card');
        cards.forEach((card, index) => {
            const titleEl = card.querySelector('.art-title');
            const artistEl = card.querySelector('.art-artist a');
            
            titleEl.contentEditable = true;
            titleEl.dataset.original = titleEl.textContent;
            
            const artistSpan = card.querySelector('.art-artist');
            
            const artistLink = artistEl;
            const linkText = artistLink.textContent;
            const linkHref = artistLink.href;
            
            const newArtistSpan = document.createElement('span');
            newArtistSpan.contentEditable = true;
            newArtistSpan.textContent = linkText;
            newArtistSpan.dataset.original = linkText;
            newArtistSpan.dataset.originalLink = linkHref;
            newArtistSpan.className = 'editable-artist';
            newArtistSpan.style.color = 'var(--text-link)';
            newArtistSpan.style.borderBottom = '1px dotted var(--border-color)';
            newArtistSpan.style.cursor = 'text';
            
            artistSpan.replaceChild(newArtistSpan, artistLink);
            
            const linkInput = document.createElement('input');
            linkInput.type = 'text';
            linkInput.className = 'artist-link-input';
            linkInput.value = linkHref;
            linkInput.style.display = 'none';
            linkInput.dataset.index = index;
            card.appendChild(linkInput);
        });

        document.getElementById('artsEditActions').classList.add('active');
        const btn = document.querySelector('.page[data-id="arts"] .edit-toggle-btn');
        if (btn) btn.textContent = 'Отменить';

        isEditingArts = true;
        showNotification('Режим редактирования артов активирован.', 'info');
    }

    function cancelArtsEdit() {
        if (!isEditingArts) return;

        artsData.arts = JSON.parse(JSON.stringify(artsOriginalData));
        renderArtsGrid();

        document.getElementById('artsEditActions').classList.remove('active');
        const btn = document.querySelector('.page[data-id="arts"] .edit-toggle-btn');
        if (btn) btn.textContent = 'Редактировать';

        isEditingArts = false;
        showNotification('Редактирование отменено', 'info');
    }

    function renderArtsGrid() {
        const container = document.getElementById('artsContainer');
        let artsHTML = '<div class="arts-grid">';
        artsData.arts.forEach(art => {
            artsHTML += `
                <div class="art-card" onclick="openLightbox('${art.image}')">
                    <img src="${art.image}" alt="${art.title}" loading="lazy" onerror="this.style.display='none'">
                    <div class="art-info">
                        <div class="art-title">${art.title}</div>
                        <div class="art-artist">
                            Художник: <a href="${art.artistLink}" target="_blank" onclick="event.stopPropagation()">${art.artist}</a>
                        </div>
                    </div>
                </div>
            `;
        });
        artsHTML += '</div>';
        container.innerHTML = artsHTML;
    }

    function saveArts() {
        const container = document.getElementById('artsContainer');
        const cards = container.querySelectorAll('.art-card');
        
        cards.forEach((card, index) => {
            const titleEl = card.querySelector('.art-title');
            const artistEl = card.querySelector('.editable-artist');
            const linkInput = card.querySelector('.artist-link-input');
            
            if (titleEl && artsData.arts[index]) {
                artsData.arts[index].title = titleEl.textContent.trim();
            }
            
            if (artistEl && artsData.arts[index]) {
                artsData.arts[index].artist = artistEl.textContent.trim();
            }
            
            if (linkInput && artsData.arts[index]) {
                artsData.arts[index].artistLink = linkInput.value.trim();
            }
        });

        document.getElementById('artsEditActions').classList.remove('active');
        const btn = document.querySelector('.page[data-id="arts"] .edit-toggle-btn');
        if (btn) btn.textContent = 'Редактировать';

        renderArtsGrid();

        isEditingArts = false;
        showNotification('Арты сохранены!', 'success');
    }

    // ===== РЕДАКТИРОВАНИЕ ФАНФИКОВ =====
    let isEditingFanfics = false;
    let fanficsOriginalData = [];

    function toggleFanficsEdit() {
        if (!isEditMode) {
            showNotification('Сначала активируйте режим редактирования (7 кликов по логотипу)', 'warning');
            return;
        }

        if (isEditingFanfics) {
            cancelFanficsEdit();
            return;
        }

        if (isEditingPage) cancelPageEdit(isEditingPage);
        if (isEditingBlock) cancelBlockEdit();
        if (isEditingArts) cancelArtsEdit();

        fanficsOriginalData = JSON.parse(JSON.stringify(fanficsData.fanfics));

        const container = document.getElementById('fanficsContainer');
        const cards = container.querySelectorAll('.fanfic-card');
        cards.forEach((card, index) => {
            const titleEl = card.querySelector('.fanfic-title a');
            const authorEl = card.querySelector('.fanfic-author');
            
            // Делаем заголовок редактируемым
            const titleText = titleEl.textContent;
            const titleHref = titleEl.href;
            
            const newTitleSpan = document.createElement('span');
            newTitleSpan.contentEditable = true;
            newTitleSpan.textContent = titleText;
            newTitleSpan.dataset.original = titleText;
            newTitleSpan.dataset.originalLink = titleHref;
            newTitleSpan.className = 'editable-fanfic-title';
            newTitleSpan.style.color = 'var(--text-link)';
            newTitleSpan.style.borderBottom = '1px dotted var(--border-color)';
            newTitleSpan.style.cursor = 'text';
            
            const titleContainer = card.querySelector('.fanfic-title');
            titleContainer.replaceChild(newTitleSpan, titleEl);
            
            // Добавляем скрытое поле для ссылки
            const linkInput = document.createElement('input');
            linkInput.type = 'text';
            linkInput.className = 'fanfic-link-input';
            linkInput.value = titleHref;
            linkInput.style.display = 'none';
            linkInput.dataset.index = index;
            card.appendChild(linkInput);
            
            // Делаем автора редактируемым
            const authorText = authorEl.textContent.replace('Автор: ', '').trim();
            const newAuthorSpan = document.createElement('span');
            newAuthorSpan.contentEditable = true;
            newAuthorSpan.textContent = authorText;
            newAuthorSpan.dataset.original = authorText;
            newAuthorSpan.className = 'editable-fanfic-author';
            newAuthorSpan.style.color = 'var(--text-primary)';
            newAuthorSpan.style.cursor = 'text';
            
            authorEl.innerHTML = '<strong>Автор:</strong> ';
            authorEl.appendChild(newAuthorSpan);
        });

        document.getElementById('fanficsEditActions').classList.add('active');
        const btn = document.querySelector('.page[data-id="fanfics"] .edit-toggle-btn');
        if (btn) btn.textContent = 'Отменить';

        isEditingFanfics = true;
        showNotification('Режим редактирования фанфиков активирован.', 'info');
    }

    function cancelFanficsEdit() {
        if (!isEditingFanfics) return;

        fanficsData.fanfics = JSON.parse(JSON.stringify(fanficsOriginalData));
        renderFanficsList();

        document.getElementById('fanficsEditActions').classList.remove('active');
        const btn = document.querySelector('.page[data-id="fanfics"] .edit-toggle-btn');
        if (btn) btn.textContent = 'Редактировать';

        isEditingFanfics = false;
        showNotification('Редактирование отменено', 'info');
    }

    function renderFanficsList() {
        const container = document.getElementById('fanficsContainer');
        let fanficsHTML = '<div class="fanfics-list">';
        fanficsData.fanfics.forEach(fanfic => {
            fanficsHTML += `
                <div class="fanfic-card">
                    <div class="fanfic-title">
                        <a href="${fanfic.url}" target="_blank">${fanfic.title}</a>
                    </div>
                    <div class="fanfic-author">
                        <strong>Автор:</strong> ${fanfic.author}
                    </div>
                </div>
            `;
        });
        fanficsHTML += '</div>';
        container.innerHTML = fanficsHTML;
    }

    function saveFanfics() {
        const container = document.getElementById('fanficsContainer');
        const cards = container.querySelectorAll('.fanfic-card');
        
        cards.forEach((card, index) => {
            const titleEl = card.querySelector('.editable-fanfic-title');
            const linkInput = card.querySelector('.fanfic-link-input');
            const authorEl = card.querySelector('.editable-fanfic-author');
            
            if (titleEl && fanficsData.fanfics[index]) {
                fanficsData.fanfics[index].title = titleEl.textContent.trim();
            }
            
            if (linkInput && fanficsData.fanfics[index]) {
                fanficsData.fanfics[index].url = linkInput.value.trim();
            }
            
            if (authorEl && fanficsData.fanfics[index]) {
                fanficsData.fanfics[index].author = authorEl.textContent.trim();
            }
        });

        document.getElementById('fanficsEditActions').classList.remove('active');
        const btn = document.querySelector('.page[data-id="fanfics"] .edit-toggle-btn');
        if (btn) btn.textContent = 'Редактировать';

        renderFanficsList();

        isEditingFanfics = false;
        showNotification('Фанфики сохранены!', 'success');
    }

    // ===== ЭКСПОРТ JSON =====
    function exportData() {
        const data = {
            characters: sortedCharacters,
            synopsis: synopsisData,
            arts: artsData.arts,
            fanfics: fanficsData.fanfics
        };

        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = 'data.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        showNotification('data.json скачан! Замените файл в репозитории.', 'success');
    }

    // ===== ПОИСК =====
    function searchCharacter() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        if (!query) return;

        const found = sortedCharacters.find(c => c.title.toLowerCase().includes(query));
        if (found) {
            navigateTo(found.id);
            document.getElementById('searchInput').value = '';
        } else {
            showNotification(`Персонаж "${query}" не найден`, 'error');
        }
    }

    // ===== УВЕДОМЛЕНИЯ =====
    function showNotification(message, type = 'info') {
        const el = document.getElementById('notification');
        el.textContent = message;
        el.className = 'notification ' + type + ' show';
        clearTimeout(el._timeout);
        el._timeout = setTimeout(() => {
            el.classList.remove('show');
        }, 4000);
    }

    // ===== ИНИЦИАЛИЗАЦИЯ =====
    function init() {
        loadTheme();

        const container = document.getElementById('contentArea');

        container.innerHTML = renderSynopsis();
        container.innerHTML += renderArts();
        container.innerHTML += renderFanfics();

        sortedCharacters.forEach(char => {
            container.innerHTML += renderPage(char);
        });

        buildNav();
        navigateTo('synopsis');
    }

    document.addEventListener('DOMContentLoaded', init);

    window.navigateTo = navigateTo;
    window.searchCharacter = searchCharacter;
    window.togglePageEdit = togglePageEdit;
    window.savePage = savePage;
    window.cancelPageEdit = cancelPageEdit;
    window.toggleBlockEdit = toggleBlockEdit;
    window.saveBlock = saveBlock;
    window.cancelBlockEdit = cancelBlockEdit;
    window.toggleArtsEdit = toggleArtsEdit;
    window.saveArts = saveArts;
    window.cancelArtsEdit = cancelArtsEdit;
    window.toggleFanficsEdit = toggleFanficsEdit;
    window.saveFanfics = saveFanfics;
    window.cancelFanficsEdit = cancelFanficsEdit;
    window.exportData = exportData;
    window.exitEditMode = exitEditMode;
    window.showNotification = showNotification;
    window.toggleTheme = toggleTheme;
    window.openLightbox = openLightbox;
    window.closeLightbox = closeLightbox;
</script>

</body>
</html>
